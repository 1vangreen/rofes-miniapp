<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>РОФЕС</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg:       var(--tg-theme-bg-color, #18181b);
    --bg2:      var(--tg-theme-secondary-bg-color, #27272a);
    --fg:       var(--tg-theme-text-color, #fafafa);
    --hint:     var(--tg-theme-hint-color, #a1a1aa);
    --link:     var(--tg-theme-link-color, #e11d48);
    --btn:      var(--tg-theme-button-color, #e11d48);
    --btn-text: var(--tg-theme-button-text-color, #fff);
    --accent:   #e11d48;
    --green:    #22c55e;
    --yellow:   #eab308;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--fg);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── TABS ── */
  .tabs {
    display: flex;
    background: var(--bg2);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
  }
  .tab {
    flex: 1;
    padding: 13px 0;
    text-align: center;
    font-size: 14px;
    font-weight: 500;
    color: var(--hint);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color .2s, border-color .2s;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── PAGES ── */
  .page { display: none; flex: 1; flex-direction: column; overflow: hidden; }
  .page.active { display: flex; }

  /* ── CHAT PAGE ── */
  #chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 14px 14px 8px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .bubble {
    max-width: 82%;
    padding: 10px 14px;
    border-radius: 18px;
    font-size: 15px;
    line-height: 1.45;
    word-break: break-word;
    white-space: pre-wrap;
  }
  .bubble.user {
    align-self: flex-end;
    background: var(--accent);
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .bubble.bot {
    align-self: flex-start;
    background: var(--bg2);
    color: var(--fg);
    border-bottom-left-radius: 4px;
  }
  .bubble.typing { opacity: .6; font-style: italic; }

  .chat-input-row {
    display: flex;
    gap: 8px;
    padding: 10px 12px;
    background: var(--bg2);
    border-top: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
  }
  #chat-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 22px;
    padding: 10px 16px;
    color: var(--fg);
    font-size: 15px;
    outline: none;
    resize: none;
    max-height: 100px;
    overflow-y: auto;
  }
  #chat-input::placeholder { color: var(--hint); }
  #send-btn {
    width: 42px; height: 42px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: opacity .15s;
  }
  #send-btn:active { opacity: .75; }
  #send-btn svg { width: 20px; height: 20px; fill: #fff; }

  /* ── REF PAGE ── */
  #ref-page {
    overflow-y: auto;
    padding: 20px 16px;
    gap: 16px;
  }

  .ref-header {
    text-align: center;
    padding: 20px 0 4px;
  }
  .ref-header .fire { font-size: 48px; line-height: 1; }
  .ref-header h1 { font-size: 22px; font-weight: 700; margin-top: 10px; }
  .ref-header p  { color: var(--hint); font-size: 14px; margin-top: 6px; }

  .card {
    background: var(--bg2);
    border-radius: 16px;
    padding: 18px;
  }
  .card-title {
    font-size: 13px;
    color: var(--hint);
    text-transform: uppercase;
    letter-spacing: .05em;
    margin-bottom: 12px;
  }

  /* Stat row */
  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .stat-row:last-child { border-bottom: none; padding-bottom: 0; }
  .stat-label { font-size: 14px; color: var(--hint); }
  .stat-value { font-size: 16px; font-weight: 600; }

  /* Progress bar */
  .progress-wrap { margin-top: 4px; }
  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: var(--hint);
    margin-bottom: 6px;
  }
  .progress-bar {
    height: 8px;
    background: rgba(255,255,255,0.08);
    border-radius: 4px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 4px;
    background: linear-gradient(90deg, var(--accent), #fb923c);
    transition: width .5s ease;
  }

  /* Rewards list */
  .reward-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .reward-item:last-child { border-bottom: none; }
  .reward-icon {
    width: 38px; height: 38px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .reward-icon.std  { background: rgba(234,179,8,.15); }
  .reward-icon.sup  { background: rgba(168,85,247,.15); }
  .reward-text .title { font-size: 14px; font-weight: 600; }
  .reward-text .sub   { font-size: 12px; color: var(--hint); margin-top: 2px; }

  /* Link box */
  .link-box {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 12px 14px;
    margin-top: 4px;
  }
  .link-text {
    flex: 1;
    font-size: 13px;
    color: var(--link);
    word-break: break-all;
    font-family: monospace;
  }
  .copy-btn {
    background: var(--btn);
    color: var(--btn-text);
    border: none;
    border-radius: 8px;
    padding: 7px 12px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    flex-shrink: 0;
    transition: opacity .15s;
  }
  .copy-btn:active { opacity: .75; }

  .share-btn {
    display: block;
    width: 100%;
    background: var(--btn);
    color: var(--btn-text);
    border: none;
    border-radius: 14px;
    padding: 15px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 4px;
    transition: opacity .15s;
  }
  .share-btn:active { opacity: .8; }

  .badge {
    display: inline-block;
    padding: 3px 9px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
  }
  .badge.prem  { background: rgba(234,179,8,.2); color: var(--yellow); }
  .badge.super { background: rgba(168,85,247,.2); color: #a855f7; }
  .badge.none  { background: rgba(255,255,255,.08); color: var(--hint); }

  .skeleton {
    background: rgba(255,255,255,0.06);
    border-radius: 8px;
    height: 18px;
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:.5} 50%{opacity:1} }

  .error-msg {
    text-align: center;
    color: var(--hint);
    font-size: 14px;
    padding: 20px;
  }
</style>
</head>
<body>

<div class="tabs">
  <div class="tab active" data-page="chat">💬 Чат</div>
  <div class="tab"        data-page="ref">💸 Рефералы</div>
</div>

<!-- ── CHAT ── -->
<div id="chat-page" class="page active">
  <div id="chat-messages">
    <div class="bubble bot">РОФЕС В ДЕЛЕ 🔥 ЧЕ НАДО НАХУЙ</div>
  </div>
  <div class="chat-input-row">
    <textarea id="chat-input" placeholder="Напиши что-нибудь..." rows="1"></textarea>
    <button id="send-btn">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<!-- ── REFERRALS ── -->
<div id="ref-page" class="page">
  <div class="ref-header">
    <div class="fire">🔥</div>
    <h1>Реферальная программа</h1>
    <p>Приводи друзей — получай премиум</p>
  </div>

  <div class="card" id="stats-card">
    <div class="card-title">Твоя статистика</div>
    <div class="skeleton" style="height:70px"></div>
  </div>

  <div class="card">
    <div class="card-title">Награды</div>
    <div class="reward-item">
      <div class="reward-icon std">⭐</div>
      <div class="reward-text">
        <div class="title">+1 день Standard</div>
        <div class="sub">За каждого приглашённого</div>
      </div>
    </div>
    <div class="reward-item">
      <div class="reward-icon sup">💎</div>
      <div class="reward-text">
        <div class="title">+1 день Super</div>
        <div class="sub">Каждые 10 рефералов (milestone)</div>
      </div>
    </div>
  </div>

  <div class="card" id="link-card">
    <div class="card-title">Твоя ссылка</div>
    <div class="link-box">
      <span class="link-text" id="ref-link-text">загружаю...</span>
      <button class="copy-btn" id="copy-btn">Копировать</button>
    </div>
    <button class="share-btn" id="share-btn">🚀 Поделиться</button>
  </div>
</div>

<script>
const tg      = window.Telegram.WebApp;
const API_URL = "%%API_URL%%";  // Vercel env или заменить вручную

tg.ready();
tg.expand();

const initData = tg.initData || "";

// ── TABS ──
document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab, .page").forEach(el => el.classList.remove("active"));
    tab.classList.add("active");
    document.getElementById(tab.dataset.page + "-page").classList.add("active");
    if (tab.dataset.page === "ref") loadRefStats();
  });
});

// ══════════════════════════ CHAT ══════════════════════════
const messagesEl = document.getElementById("chat-messages");
const inputEl    = document.getElementById("chat-input");
const sendBtn    = document.getElementById("send-btn");

let sending = false;

function addBubble(text, role) {
  const div = document.createElement("div");
  div.className = "bubble " + role;
  div.textContent = text;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || sending) return;
  sending = true;
  inputEl.value = "";
  inputEl.style.height = "";

  addBubble(text, "user");
  tg.HapticFeedback.impactOccurred("light");

  const typing = addBubble("печатает...", "bot typing");

  try {
    const res = await fetch(API_URL + "/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-Init-Data": initData,
      },
      body: JSON.stringify({ text }),
    });

    const data = await res.json();
    typing.remove();

    if (res.ok) {
      addBubble(data.reply, "bot");
    } else {
      addBubble("ЕБАТЬ СЛОМАЛСЯ НАХУЙ 😤", "bot");
    }
  } catch {
    typing.remove();
    addBubble("Нет соединения 😬", "bot");
  }
  sending = false;
}

sendBtn.addEventListener("click", sendMessage);
inputEl.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
inputEl.addEventListener("input", () => {
  inputEl.style.height = "";
  inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + "px";
});

// ══════════════════════════ REFERRALS ══════════════════════════
let statsLoaded = false;
let refLink     = "";

async function loadRefStats() {
  if (statsLoaded) return;
  try {
    const res = await fetch(API_URL + "/ref", {
      headers: { "X-Init-Data": initData }
    });
    if (!res.ok) throw new Error(res.status);
    const d = await res.json();
    statsLoaded = true;
    refLink = d.ref_link || "";
    renderStats(d);
    renderLink(d.ref_link);
  } catch (e) {
    document.getElementById("stats-card").innerHTML =
      '<div class="card-title">Твоя статистика</div>' +
      '<div class="error-msg">Не удалось загрузить 😬<br>Попробуй позже</div>';
  }
}

function renderStats(d) {
  const nextIn   = d.next_super_in;
  const progress = nextIn === 0 ? 100 : Math.round(((10 - nextIn) / 10) * 100);

  const prem  = d.is_super
    ? `<span class="badge super">💎 Super до ${d.super_until}</span>`
    : d.is_premium
    ? `<span class="badge prem">⭐ Standard до ${d.prem_until}</span>`
    : `<span class="badge none">Нет подписки</span>`;

  document.getElementById("stats-card").innerHTML = `
    <div class="card-title">Твоя статистика</div>
    <div class="stat-row">
      <span class="stat-label">Статус</span>
      <span class="stat-value">${prem}</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Рефералов всего</span>
      <span class="stat-value">${d.total}</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Дней Standard получено</span>
      <span class="stat-value">+${d.std_days_total}</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Дней Super получено</span>
      <span class="stat-value">+${d.super_days_total}</span>
    </div>
    <div class="progress-wrap" style="margin-top:14px">
      <div class="progress-info">
        <span>До следующего 💎 Super-дня</span>
        <span>${nextIn === 0 ? "получен!" : `ещё ${nextIn}`}</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" style="width:${progress}%"></div>
      </div>
    </div>`;
}

function renderLink(link) {
  document.getElementById("ref-link-text").textContent = link || "недоступно";
}

document.getElementById("copy-btn").addEventListener("click", () => {
  if (!refLink) return;
  navigator.clipboard.writeText(refLink).then(() => {
    const btn = document.getElementById("copy-btn");
    btn.textContent = "Скопировано!";
    tg.HapticFeedback.notificationOccurred("success");
    setTimeout(() => btn.textContent = "Копировать", 2000);
  });
});

document.getElementById("share-btn").addEventListener("click", () => {
  if (!refLink) return;
  const text = `Попробуй РОФЕС — безумный орущий бот 🔥\n${refLink}`;
  tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(refLink)}&text=${encodeURIComponent("Попробуй РОФЕС 🔥")}`);
});
</script>
</body>
</html>
